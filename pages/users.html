<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Chefs</title>
    <link rel="stylesheet" href="../style.css?v=1.3">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Home</a>
            <a href="create.html">Create Recipe</a>
            <a href="feed.html">My Feed</a>
            <a href="users.html">Discover</a>
            <a href="login.html" id="auth-link">Login</a>
        </nav>
    </header>
    <main>
        <section class="banner">
            <h1>Discover Chefs</h1>
            <p>Find new friends and follow them to see their recipes!</p>
        </section>
        
        <section class="search-section" style="max-width: 600px; margin: 0 auto 30px; display: flex; gap: 10px; padding: 0 20px;">
            <input type="text" id="user-search" placeholder="Search for chefs by username..." style="flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 1rem;">
            <button id="user-search-btn" class="submit-btn" style="padding: 12px 24px; margin: 0;">Search</button>
        </section>

        <section class="recipes-section">
            <div id="users-container" class="recipe-grid">
                <p>Loading chefs...</p>
            </div>
        </section>
    </main>
    <script src="../script.js?v=1.3"></script>
</body>
</html>
